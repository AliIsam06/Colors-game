name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-debug-apk:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Sync Capacitor Android project
        run: npm run android:sync

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: Colors-Flow-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk

      - name: Commit APK to repository
        run: |
          mkdir -p releases
          cp android/app/build/outputs/apk/debug/app-debug.apk "releases/Colors Flow.apk"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "releases/Colors Flow.apk"
          git commit -m "Update debug APK [skip ci]" || exit 0
          git push
